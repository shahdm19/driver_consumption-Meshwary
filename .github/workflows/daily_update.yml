name: Daily Fuel Price Update

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install curl_cffi beautifulsoup4 groq python-dotenv

      - name: Run Update Script
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python update_fuel_prices.py

      - name: Commit and Push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add fuel_prices.json
          git diff --staged --quiet || (git commit -m "chore: update fuel prices" && git pull --rebase origin main && git push)
